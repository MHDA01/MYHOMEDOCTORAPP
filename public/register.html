<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHomeDoctorApp - Crear Cuenta</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .bg-light-medical {
            background: linear-gradient(135deg, #d0e8eb 0%, #e8f4f6 100%);
        }
        
        .gradient-medical {
            background: linear-gradient(135deg, #0f766e 0%, #0d9488 100%);
        }
    </style>
</head>
<body class="bg-white">
    
    <!-- Container -->
    <div class="min-h-screen flex">
        <!-- Lado Izquierdo (Info) -->
        <div class="hidden lg:flex lg:w-1/2 bg-light-medical text-slate-900 flex-col justify-center p-8 lg:p-12 -mt-20">
            <!-- Logo Section -->
            <div class="text-center pt-1 mb-4">
                <img 
                    src="https://i.postimg.cc/SsRdwdzD/LOGO-1-transparent.png" 
                    alt="MyHomeDoctorApp Logo"
                    class="w-64 h-64 mx-auto mb-0"
                >
                <p class="text-2xl font-semibold text-slate-900 mt-2">Gestión Médica Inteligente</p>
            </div>
            
            <!-- Features Section -->
            <div class="space-y-3">
                <div class="flex gap-4">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-brain text-white text-lg"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-base mb-1">IA Médica</h3>
                        <p class="text-sm text-slate-700">Análisis automático con Gemini</p>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-shield-alt text-white text-lg"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-base mb-1">Seguro</h3>
                        <p class="text-sm text-slate-700">Encriptación de grado militar</p>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-mobile-alt text-white text-lg"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-base mb-1">Accesible</h3>
                        <p class="text-sm text-slate-700">Disponible en cualquier dispositivo</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Lado Derecho (Formulario) -->
        <div class="flex-1 flex flex-col justify-center p-6 lg:p-12">
            <div class="w-full max-w-md mx-auto">
                <!-- Logo Mobile -->
                <div class="lg:hidden text-center mb-12">
                    <img 
                        src="https://i.postimg.cc/SsRdwdzD/LOGO-1-transparent.png" 
                        alt="MyHomeDoctorApp Logo"
                        class="w-64 h-64 mx-auto mb-6"
                    >
                </div>
                
                <h2 class="text-3xl font-bold text-slate-900 mb-2">Crear Cuenta</h2>
                <p class="text-slate-600 mb-8">Protege la salud de tu familia</p>
                
                <!-- Formulario -->
                <form id="registerForm" class="space-y-6">
                    <!-- Nombre -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-900 mb-2">Nombre Completo</label>
                        <input 
                            type="text"
                            id="displayName"
                            placeholder="Dr. Juan García"
                            required
                            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                        >
                    </div>
                    
                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-900 mb-2">Email</label>
                        <input 
                            type="email"
                            id="email"
                            placeholder="tu@email.com"
                            required
                            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                        >
                    </div>
                    
                    <!-- Contraseña -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-900 mb-2">Contraseña</label>
                        <input 
                            type="password"
                            id="password"
                            placeholder="••••••••"
                            required
                            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                        >
                        <p class="text-xs text-slate-500 mt-1">Mínimo 6 caracteres</p>
                    </div>
                    
                    <!-- Botón -->
                    <button 
                        type="submit"
                        class="w-full py-3 gradient-medical text-white rounded-lg font-semibold hover:opacity-90 transition"
                    >
                        Crear Cuenta
                    </button>
                </form>
                
                <!-- Links -->
                <div class="mt-6 text-center">
                    <p class="text-slate-600">
                        ¿Ya tienes cuenta? 
                        <a href="login.html" class="font-semibold text-teal-600 hover:text-teal-700">Inicia sesión aquí</a>
                    </p>
                </div>
                
                <div class="mt-8 text-center">
                    <a href="index.html" class="text-slate-600 hover:text-slate-900 text-sm font-medium">
                        <i class="fas fa-arrow-left mr-1"></i> Volver al inicio
                    </a>
                </div>
                
                <!-- Estado -->
                <div id="registerStatus" class="mt-6"></div>
            </div>
        </div>
    </div>
    
    <!-- Firebase Config (Modular) -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="user-setup.js"></script>
    
    <script type="module">
        import { auth } from './firebase-config.js';
        import { setupUserDocument } from './user-setup.js';
        
        const form = document.getElementById('registerForm');
        const statusDiv = document.getElementById('registerStatus');
        
        // Todos los usuarios van a family-health.html (dashboard de paciente)
        async function redirectByRole(user) {
            await setupUserDocument(user, 'patient');
            window.location.href = 'family-health.html';
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('displayName').value;
            
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                
                await result.user.updateProfile({
                    displayName: displayName
                });
                
                // Crear documento de usuario en Firestore con rol de paciente por defecto
                await setupUserDocument(result.user, 'patient');
                
                statusDiv.innerHTML = '<div class="p-4 bg-green-100 text-green-800 rounded-lg">✅ Cuenta creada. Redirigiendo...</div>';
                setTimeout(() => {
                    redirectByRole(result.user);
                }, 1500);
            } catch (error) {
                statusDiv.innerHTML = `<div class="p-4 bg-red-100 text-red-800 rounded-lg">❌ ${error.message}</div>`;
            }
        });
        
        // Si ya está autenticado, verificar rol y redirigir
        auth.onAuthStateChanged((user) => {
            if (user) {
                redirectByRole(user);
            }
        });
    </script>
    
</body>
</html>
