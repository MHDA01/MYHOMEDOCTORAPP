# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci && npm run build
      - run: npm install -g firebase-tools
      - run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MYHOMEDOCTORAPP }}' > "$RUNNER_TEMP/firebase-service-account.json"
      - run: firebase deploy --only hosting --project myhomedoctorapp --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
